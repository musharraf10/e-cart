<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NoorFit - Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        background: #0f172a;
        color: #f8fafc;
      }

      main {
        max-width: 420px;
        padding: 24px;
        border: 1px solid #334155;
        border-radius: 16px;
        background: #111827;
        text-align: center;
      }

      a {
        color: #22d3ee;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>You're offline</h1>
      <p>No internet connection right now. Try again once you're connected.</p>
      <p><a href="/">Go back home</a></p>
    </main>
  </body>
</html>
