<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"
    />
    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <title>NoorFit – Crafted for Comfort. Designed for Life.</title>
    <meta
      name="description"
      content="NoorFit – a modern clothing e‑commerce experience crafted for comfort and designed for life."
    />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#000000" />
    <script>
      (() => {
        const storedTheme = localStorage.getItem("theme");
        const systemDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        const theme = storedTheme === "light" || storedTheme === "dark" ? storedTheme : (systemDark ? "dark" : "light");
        if (theme === "dark") document.documentElement.classList.add("dark");
      })();
    </script>
  </head>
  <body class="bg-bg-primary text-text-primary max-w-full overflow-x-hidden">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
